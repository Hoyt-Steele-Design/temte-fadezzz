name: Auto-merge content PRs to staging

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - staging

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'content/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge content PR into staging
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
