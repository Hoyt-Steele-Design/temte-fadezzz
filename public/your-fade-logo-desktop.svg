<svg width="100%" viewBox="0 0 1440 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Your Fade Logo - Desktop Horizontal</title>
  <style>
    .logo-piece {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: 900ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }

    .logo-fade {
      animation-name: desktopSlideLeft;
      animation-delay: 80ms;
      animation-duration: 1450ms;
    }

    .logo-x {
      animation-name: desktopMark;
      animation-delay: 700ms;
    }

    .logo-story {
      animation-name: desktopSlideRight;
      animation-delay: 80ms;
      animation-duration: 1450ms;
    }

    @keyframes desktopSlideLeft {
      from {
        opacity: 0;
        transform: translateX(-56px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes desktopSlideRight {
      from {
        opacity: 0;
        transform: translateX(56px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes desktopMark {
      from {
        opacity: 0;
        transform: scale(1.28);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-piece {
        opacity: 1;
        animation: none;
      }
    }
  </style>
  <defs>
    <filter id="desktop-white-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.2"/>
    </filter>
    <filter id="desktop-gold-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#DDBA52" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#DDBA52" flood-opacity="0.16"/>
    </filter>
    <mask id="desktop-text-gaps" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1440" height="260" fill="white"/>
      <rect x="139" y="74" width="1162" height="78" fill="black" rx="2"/>
      <rect x="141" y="76" width="1162" height="78" fill="black" rx="2"/>
    </mask>
  </defs>

  <g class="logo-piece logo-fade">
    <text x="646" y="155" text-anchor="end" font-family="Garamond, EB Garamond, serif" font-size="72" font-weight="500" letter-spacing="7" fill="#000000" opacity="0.16">YOUR FADE</text>
    <text x="644" y="153" text-anchor="end" font-family="Garamond, EB Garamond, serif" font-size="72" font-weight="500" letter-spacing="7" fill="#ffffff" filter="url(#desktop-white-glow)">YOUR FADE</text>
  </g>

  <g class="logo-piece logo-x">
    <text x="720" y="171" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="118" font-weight="600" font-style="italic" fill="#000000" opacity="0.18">X</text>
    <text x="720" y="168" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="118" font-weight="600" font-style="italic" fill="#DDBA52" filter="url(#desktop-gold-glow)">X</text>
  </g>

  <g class="logo-piece logo-story">
    <text x="808" y="155" text-anchor="start" font-family="Garamond, EB Garamond, serif" font-size="72" font-weight="500" letter-spacing="7" fill="#000000" opacity="0.16">YOUR STORY</text>
    <text x="806" y="153" text-anchor="start" font-family="Garamond, EB Garamond, serif" font-size="72" font-weight="500" letter-spacing="7" fill="#DDBA52" filter="url(#desktop-gold-glow)">YOUR STORY</text>
  </g>

</svg>
