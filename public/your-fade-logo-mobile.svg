<svg width="100%" viewBox="0 0 690 770" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Your Fade Logo - Mobile No Background Final</title>
  <style>
    .logo-piece {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: 920ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }

    .logo-fade {
      animation-name: mobileSlideLeft;
      animation-delay: 80ms;
      animation-duration: 1080ms;
    }

    .logo-x {
      animation-name: mobileMark;
      animation-delay: 620ms;
    }

    .logo-story {
      animation-name: mobileSlideRight;
      animation-delay: 80ms;
      animation-duration: 1080ms;
    }

    @keyframes mobileSlideLeft {
      from {
        opacity: 0;
        transform: translateX(-38px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes mobileSlideRight {
      from {
        opacity: 0;
        transform: translateX(38px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes mobileMark {
      from {
        opacity: 0;
        transform: scale(1.28);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-piece {
        opacity: 1;
        animation: none;
      }
    }
  </style>
  <defs>
    <radialGradient id="vignette2" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="colFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="15%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="85%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  <filter id="mobile-white-glow" x="-10%" y="-40%" width="120%" height="180%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.9"/><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.2"/><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.14"/></filter><filter id="mobile-gold-glow" x="-10%" y="-40%" width="120%" height="180%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="1"/><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#DDBA52" flood-opacity="0.34"/><feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#DDBA52" flood-opacity="0.16"/></filter>
</defs>

  <!-- Top rule at y=100, text starts at y=198 — gap of 98px -->
  <!-- YOUR FADE — white -->
  <g class="logo-piece logo-fade">
    <text x="342" y="284" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#000000" opacity="0.16" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.16;font-family:Garamond, &quot;EB Garamond&quot;, serif;font-size:92px;font-weight:500;text-anchor:middle;dominant-baseline:auto">YOUR FADE</text>
    <text x="340" y="282" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#ffffff" filter="url(#mobile-white-glow)" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Garamond, &quot;EB Garamond&quot;, serif;font-size:92px;font-weight:500;text-anchor:middle;dominant-baseline:auto">YOUR FADE</text>
  </g>

  <!-- X -->
  <g class="logo-piece logo-x">
    <text x="342" y="445" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="154" font-weight="600" font-style="italic" fill="#000000" opacity="0.26" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.26;font-family:Garamond, &quot;EB Garamond&quot;, serif;font-size:154px;font-weight:600;font-style:italic;text-anchor:middle;dominant-baseline:auto">X</text>
    <text x="340" y="443" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="154" font-weight="600" font-style="italic" fill="#DDBA52" filter="url(#mobile-gold-glow)" style="fill:rgb(221, 186, 82);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Garamond, &quot;EB Garamond&quot;, serif;font-size:154px;font-weight:600;font-style:italic;text-anchor:middle;dominant-baseline:auto">X</text>
  </g>

  <!-- YOUR STORY — gold -->
  <g class="logo-piece logo-story">
    <text x="342" y="557" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#000000" opacity="0.24" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.24;font-family:Garamond, &quot;EB Garamond&quot;, serif;font-size:92px;font-weight:500;text-anchor:middle;dominant-baseline:auto">YOUR STORY</text>
    <text x="340" y="555" text-anchor="middle" font-family="Garamond, EB Garamond, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#DDBA52" filter="url(#mobile-gold-glow)" style="fill:rgb(221, 186, 82);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Garamond, &quot;EB Garamond&quot;, serif;font-size:92px;font-weight:500;text-anchor:middle;dominant-baseline:auto">YOUR STORY</text>
  </g>

  <!-- Bottom rule: STORY baseline ~615, descender ~625, + 98px gap = 723 to match top -->
</svg>
