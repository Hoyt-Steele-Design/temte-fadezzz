<svg id="desktop-logo" width="100%" viewBox="0 0 1440 260" overflow="visible" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Your Fade × Your Story</title>
  <style>
    #desktop-logo .logo-piece {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: 900ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }

    #desktop-logo .logo-fade {
      animation-name: desktopSlideLeft;
      animation-delay: 80ms;
      animation-duration: 1450ms;
    }

    #desktop-logo .logo-x {
      animation-name: desktopMark;
      animation-delay: 700ms;
    }

    #desktop-logo .logo-story {
      animation-name: desktopSlideRight;
      animation-delay: 80ms;
      animation-duration: 1450ms;
    }

    @keyframes desktopSlideLeft {
      from {
        opacity: 0;
        transform: translateX(-56px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes desktopSlideRight {
      from {
        opacity: 0;
        transform: translateX(56px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes desktopMark {
      from {
        opacity: 0;
        transform: scale(1.28);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #desktop-logo .x-gold {
      text-shadow: 0px 2px 4px rgba(0,0,0,0.5), 0px 0px 3px rgba(240,208,96,0.7), 0px 0px 8px rgba(240,208,96,0.3);
    }
    #desktop-logo .fade-white {
      text-shadow: 0px 2px 6px rgba(0,0,0,0.5), 0px 0px 10px rgba(255,255,255,0.12);
    }
    #desktop-logo .story-gold {
      text-shadow: 0px 2px 4px rgba(0,0,0,0.5), 0px 0px 3px rgba(240,208,96,0.65), 0px 0px 8px rgba(240,208,96,0.28);
    }

    @media (prefers-reduced-motion: reduce) {
      #desktop-logo .logo-piece {
        opacity: 1;
        animation: none;
      }
    }
  </style>
  <defs>
    <linearGradient id="desktop-gold-grad" x1="350" y1="0" x2="1380" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c0982e"/>
      <stop offset="36%" stop-color="#ffe060"/>
      <stop offset="68%" stop-color="#ffd84a"/>
      <stop offset="100%" stop-color="#d4b840"/>
    </linearGradient>
    <filter id="desktop-white-glow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.14"/>
    </filter>
    <filter id="desktop-story-glow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#f0d060" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f0d060" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g class="logo-piece logo-fade">
    <text x="646" y="155" text-anchor="end" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="72" font-weight="560" letter-spacing="7" fill="#000000" opacity="0.16">YOUR FADE</text>
    <g filter="url(#desktop-white-glow)">
      <text x="644" y="153" text-anchor="end" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="72" font-weight="560" letter-spacing="7" fill="#ffffff" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.8" paint-order="stroke fill" class="fade-white">YOUR FADE</text>
    </g>
  </g>

  <g class="logo-piece logo-x">
    <text x="720" y="170" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="118" font-weight="515" font-style="italic" fill="#000000" opacity="0.26">X</text>
    <g filter="url(#desktop-story-glow)">
      <text x="720" y="168" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="118" font-weight="515" font-style="italic" fill="url(#desktop-gold-grad)" stroke="#ffd250" stroke-width="0.6" stroke-opacity="0.75" paint-order="stroke fill" class="x-gold">X</text>
    </g>
  </g>

  <g class="logo-piece logo-story">
    <text x="808" y="155" text-anchor="start" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="72" font-weight="560" letter-spacing="7" fill="#000000" opacity="0.24">YOUR STORY</text>
    <g filter="url(#desktop-story-glow)">
      <text x="806" y="153" text-anchor="start" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="72" font-weight="560" letter-spacing="7" fill="url(#desktop-gold-grad)" stroke="#ffd250" stroke-width="0.6" stroke-opacity="0.75" paint-order="stroke fill" class="story-gold">YOUR STORY</text>
    </g>
  </g>
</svg>
