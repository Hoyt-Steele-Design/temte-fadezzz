<svg id="mobile-logo" width="100%" viewBox="-80 0 850 770" overflow="visible" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Your Fade × Your Story</title>
  <style>
    #mobile-logo .logo-piece {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: 920ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
    }

    #mobile-logo .logo-fade {
      animation-name: mobileSlideLeft;
      animation-delay: 80ms;
      animation-duration: 1080ms;
    }

    #mobile-logo .logo-x {
      animation-name: mobileMark;
      animation-delay: 620ms;
    }

    #mobile-logo .logo-story {
      animation-name: mobileSlideRight;
      animation-delay: 80ms;
      animation-duration: 1080ms;
    }

    @keyframes mobileSlideLeft {
      from {
        opacity: 0;
        transform: translateX(-38px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes mobileSlideRight {
      from {
        opacity: 0;
        transform: translateX(38px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes mobileMark {
      from {
        opacity: 0;
        transform: scale(1.28);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #mobile-logo .logo-piece {
        opacity: 1;
        animation: none;
      }
    }
  </style>
  <defs>
    <radialGradient id="mobile-vignette" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mobile-col-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="15%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="85%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="mobile-white-glow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.14"/>
    </filter>
    <filter id="mobile-gold-glow" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#DDBA52" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#DDBA52" flood-opacity="0.16"/>
    </filter>
    <!-- Large objectBoundingBox margins for the italic X — applied to a <g> so WebKit doesn't clip at typographic bounds -->
    <filter id="mobile-x-gold-glow" filterUnits="userSpaceOnUse" x="-80" y="260" width="850" height="260">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#DDBA52" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#DDBA52" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- YOUR FADE — white -->
  <g class="logo-piece logo-fade">
    <text x="342" y="284" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#000000" opacity="0.16">YOUR FADE</text>
    <g filter="url(#mobile-white-glow)">
      <text x="340" y="282" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#ffffff">YOUR FADE</text>
    </g>
  </g>

  <!-- X -->
  <g class="logo-piece logo-x">
    <text x="342" y="445" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="154" font-weight="550" font-style="italic" fill="#000000" opacity="0.26">X</text>
    <g filter="url(#mobile-x-gold-glow)">
      <text x="340" y="443" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="154" font-weight="550" font-style="italic" fill="#DDBA52">X</text>
    </g>
  </g>

  <!-- YOUR STORY — gold -->
  <g class="logo-piece logo-story">
    <text x="342" y="557" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#000000" opacity="0.24">YOUR STORY</text>
    <g filter="url(#mobile-gold-glow)">
      <text x="340" y="555" text-anchor="middle" font-family="'EB Garamond', Garamond, Baskerville, Georgia, serif" font-size="92" font-weight="500" letter-spacing="5" fill="#DDBA52">YOUR STORY</text>
    </g>
  </g>
</svg>
