headline: Hi, I'm Temte
bio: >-
  I specialize in fades, beard work, and detailed design cuts. I also offer hot
  lather straight razor services, along with hot wax and skincare treatments to
  elevate your experience.


  My goal is simple: to give you a great conversation and a meticulously
  detailed haircut that brings a new level of confidence. A cut that looks sharp
  today — and stays easy to style and manage for 2–4 weeks after.
